</ul>

<h2 id="content-management">៣. ការគ្រប់គ្រងមាតិកា</h2>
<p>មាតិកាគឺជាទំព័រ និងផ្នែកនៃវេបសាយរបស់អ្នក។ មាតិកានីមួយៗភ្ជាប់ជាមួយធាតុម៉ឺនុយ និងមានប្រភេទជាក់លាក់។</p>

<h3>ប្រភេទមាតិកា</h3>

  <tr><td><strong>ព័ត៌មាន/ប្លុក</strong></td><td>អត្ថបទព័ត៌មានជាមួយចំណងជើង, ការពិពណ៌នា, រូបភាព និងថ្ងៃផ្សាយ</td></tr>

<h3>ការបង្កើតមាតិកា</h3>
<ol>
  <li>ចូលទៅ <strong>មាតិកា</strong> នៅក្នុងរបារចំហៀង</li>
  <li>ចុច <strong>បន្ថែមថ្មី</strong></li>
  <li>បំពេញទម្រង់:
    <ul>
      <li><strong>ចំណងជើង</strong> — ចំណងជើងទំព័រ/ផ្នែក</li>
      <li><strong>ប្រភេទមាតិកា</strong> — ជ្រើសរើសប្រភេទ (អត្ថបទ, រូបភាព, វីដេអូ ។ល។)</li>
      <li><strong>ម៉ឺនុយ</strong> — ជ្រើសរើសធាតុម៉ឺនុយដែលមាតិកានេះស្ថិតនៅ</li>
      <li><strong>ភាសា</strong> — ជ្រើសរើសភាសាសម្រាប់មាតិកានេះ</li>
      <li><strong>ការពិពណ៌នា</strong> — បញ្ចូលមាតិការបស់អ្នក (ឧបករណ៍កែសម្រួលអត្ថបទសម្រាប់អត្ថបទ)</li>
    </ul>
  </li>
  <li>ចុច <strong>រក្សាទុក</strong></li>
</ol>

<h3>ការកែសម្រួលមាតិកា</h3>
<ol>
  <li>ចូលទៅ <strong>មាតិកា</strong> និងស្វែងរកធាតុដែលអ្នកចង់កែសម្រួល</li>
  <li>ចុច <strong>រូបតំណាងប៊ីចង្កៀវ</strong> (✏️) នៅខាងស្តាំ</li>
  <li>ធ្វើបច្ចុប្បន្នភាពវាល និងចុច <strong>រក្សាទុក</strong></li>
</ol>

<h3>ការលុបមាតិកា</h3>
<ol>
  <li>ចុច <strong>រូបតំណាងធុងសំរាម</strong> (🗑️) លើធាតុមាតិកា</li>
  <li>បញ្ជាក់ការលុប</li>
</ol>
<blockquote><p>⚠️ <strong>ការព្រមាន:</strong> មាតិកាដែលបានលុបមិនអាចស្តារវិញបានទេ។</p></blockquote>

<h3>ការគ្រប់គ្រងធាតុមាតិកា (រូបភាព, វីដេអូ, ឯកសារ, ព័ត៌មាន)</h3>
<p>សម្រាប់មាតិកាប្រភេទវិចិត្រសាល អ្នកអាចគ្រប់គ្រងធាតុនីមួយៗក្នុងផ្នែកមាតិកា:</p>
<ol>
  <li>ចុចលើធាតុមាតិកាដើម្បីបើកទំព័រលម្អិត</li>
  <li>ប្រើផ្ទាំង <strong>ធាតុ</strong> ដើម្បីបន្ថែម, កែសម្រួល ឬលុបរូបភាព/វីដេអូ/ឯកសារនីមួយៗ</li>
  <li>ប្រើផ្ទាំង <strong>ព័ត៌មាន</strong> (សម្រាប់មាតិកាប្រភេទព័ត៌មាន) ដើម្បីគ្រប់គ្រងអត្ថបទព័ត៌មាន</li>
</ol>

<h3>ការបន្ថែមអត្ថបទព័ត៌មាន</h3>
<ol>
  <li>បើកផ្នែកមាតិកាប្រភេទ <strong>ព័ត៌មាន</strong></li>
  <li>ចុច <strong>បន្ថែមថ្មី</strong></li>
  <li>បំពេញ:
    <ul>
      <li><strong>ចំណងជើង</strong> — ចំណងជើងព័ត៌មាន</li>
      <li><strong>ការពិពណ៌នាខ្លី</strong> — សេចក្តីសង្ខេបខ្លីសម្រាប់បង្ហាញក្នុងបញ្ជី</li>
      <li><strong>ការពិពណ៌នា</strong> — មាតិកាអត្ថបទពេញលេញ (ឧបករណ៍កែសម្រួលអត្ថបទ)</li>
      <li><strong>រូបភាពចម្បង</strong> — រូបភាពខ្លៅ/គ្រប់</li>
      <li><strong>ថ្ងៃផ្សាយ</strong> — ពេលដែលអត្ថបទគួរបង្ហាញ</li>
      <li><strong>ស្ថានភាព</strong> — បិទ/បើក <strong>បង្ហាញ</strong> (មើលឃើញ) ឬ <strong>មិនបង្ហាញ</strong> (លាក់)</li>
      <li><strong>អាទិភាព</strong> — សម្គាល់ជាលក្ខណៈពិសេស</li>
    </ul>
  </li>
  <li>ចុច <strong>រក្សាទុក</strong></li>
</ol>

<h3>ការគ្រប់គ្រងមាតិកាផែនទី</h3>
<ol>
  <li>បើកផ្នែកមាតិកាប្រភេទ <strong>ផែនទី</strong></li>
  <li>ចូលទៅផ្ទាំង <strong>ផែនទី</strong></li>
  <li>កំណត់កូអរដោនេ <strong>រយៈទទឹង</strong> និង <strong>រយៈបណ្តោយ</strong></li>
  <li>បន្ថែម <strong>ចំណងជើង</strong> និង <strong>ការពិពណ៌នា</strong> សម្រាប់ស្លាក</li>
  <li>បិទ/បើក <strong>មើលឃើញ</strong> ដើម្បីបង្ហាញ/លាក់ផែនទី</li>
  <li>ចុច <strong>រក្សាទុក</strong></li>
</ol>

<h2 id="menu-management">៤. ការគ្រប់គ្រងម៉ឺនុយ</h2>
<p>ម៉ឺនុយកំណត់រចនាសម្ព័ន្ធរុករកវេបសាយរបស់អ្នក។ ធាតុម៉ឺនុយនីមួយៗភ្ជាប់ទៅទំព័រមាតិកា ឬ URL ខាងក្រៅ។</p>

<h3>ការយល់ដឹងអំពីរចនាសម្ព័ន្ធម៉ឺនុយ</h3>
<ul>
  <li><strong>ធាតុកម្រិតកំពូល</strong> បង្ហាញក្នុងរបាររុករកមុខ</li>
  <li><strong>ធាតុរង</strong> (កូន) បង្ហាញក្នុងម៉ឺនុយទម្លាក់ចុះក្រោមឪពុករបស់វា</li>
  <li>ម៉ឺនុយគឺ <strong>តាមភាសា</strong> — ភាសានីមួយៗមានមែកធាងម៉ឺនុយផ្ទាល់ខ្លួន</li>
</ul>

<h3>ការបង្កើតធាតុម៉ឺនុយ</h3>
<ol>
  <li>ចូលទៅ <strong>ម៉ឺនុយ</strong> នៅក្នុងរបារចំហៀង</li>
  <li>ចុច <strong>បន្ថែមថ្មី</strong></li>
  <li>បំពេញ:
    <ul>
      <li><strong>ឈ្មោះម៉ឺនុយ</strong> — អត្ថបទបង្ហាញក្នុងរុករក (ឧទាហរណ៍ "អំពីយើង")</li>
      <li><strong>URL ម៉ឺនុយ</strong> — តំណជំរើស (ទុកទទេបើភ្ជាប់ទៅមាតិកា)</li>
      <li><strong>ម៉ឺនុយមេ</strong> — ជ្រើសរើសមេសម្រាប់ម៉ឺនុយរង ឬ "គ្មាន" សម្រាប់កម្រិតកំពូល</li>
      <li><strong>ភាសា</strong> — ភាសាសម្រាប់ម៉ឺនុយនេះ</li>
      <li><strong>លំដាប់</strong> — ទីតាំងបង្ហាញ (លេខតូចបង្ហាញមុន)</li>
    </ul>
  </li>
  <li>ចុច <strong>រក្សាទុក</strong></li>
</ol>

<h3>ការតំរៀបម៉ឺនុយឡើងវិញ</h3>
<ol>

  <li>ចុច <strong>ព្រួញឡើង/ចុះ</strong> ដើម្បីផ្លាស់ទីវា</li>

  <li>ចុច <strong>រូបតំណាងធុងសំរាម</strong> (🗑️) ដើម្បីលុប — បញ្ជាក់ពេលសួរ</li>

<h2 id="media-library">៥. បណ្ណាល័យមីឌៀ</h2>
<p>បណ្ណាល័យមីឌៀគ្រប់គ្រងរូបភាព, វីដេអូ និងឯកសារទាំងអស់ដែលបានផ្ទុកឡើងទៅវេបសាយរបស់អ្នក។ ឯកសារត្រូវបានរក្សាទុកលើកន្លែងផ្ទុកពពក។</p>

<h3>ការផ្ទុកឯកសារឡើង</h3>
<ol>

  <li>ចុច <strong>ជ្រើសរើសឯកសារ</strong> ឬអូសដាក់</li>
  <li>ជ្រើសរើសឯកសាររបស់អ្នក — គាំទ្ររូបភាព, វីដេអូ និងឯកសារ</li>
  <li>រង់ចាំការផ្ទុកឡើងរួចរាល់</li>
  <li>ឯកសារបង្ហាញក្នុងបណ្ណាល័យមីឌៀជាមួយ URL ដែលអាចចែករំលែកបាន</li>
</ol>

<code>https://khmer.sgp1.digitaloceanspaces.com/your-file-path</code></p>

<h2 id="settings">៦. ការកំណត់</h2>
<p>ការកំណត់គ្រប់គ្រងរចនាប័ទ្ម និងឥរិយាបថនៃវេបសាយសាធារណៈរបស់អ្នក។</p>

<h3>៦.១ ការកំណត់ទូទៅ</h3>
<p>ចូលទៅ <strong>ការកំណត់ → ទូទៅ</strong></p>
<ul>
  <li><strong>ចំណងជើងវេបសាយ</strong> — ឈ្មោះវេបសាយរបស់អ្នក (បង្ហាញក្នុងផ្ទាំងកម្មវិធីរុករក និងបឋមកថា)</li>
  <li><strong>អត្ថបទជើងទំព័រ</strong> — អត្ថបទបង្ហាញនៅបាតវេបសាយ</li>
</ul>

<h4>ពណ៌ស្បែក</h4>
<table>
  <tr><th>ស្បែក</th><th>ការពិពណ៌នា</th></tr>
  <tr><td>លំនាំដើម</td><td>ស្បែកពណ៌ស/ធម្មតា</td></tr>
  <tr><td>បញ្ច្រាស</td><td>ស្បែកពណ៌ងងឹត</td></tr>
  <tr><td>ក្រហម</td><td>ពណ៌ក្រហម</td></tr>
  <tr><td>បៃតង</td><td>ពណ៌បៃតង</td></tr>
  <tr><td>ស្វាយ</td><td>ពណ៌ស្វាយ</td></tr>
  <tr><td>លឿង</td><td>ពណ៌លឿង</td></tr>
</table>

<h4>ប្លង់ទំព័រ</h4>
<table>
  <tr><th>ប្លង់</th><th>ការពិពណ៌នា</th></tr>
  <tr><td>ពហុទំព័របុរាណ</td><td>វេបសាយបុរាណជាមួយទំព័រដាច់ដោយឡែកក្នុងមួយធាតុម៉ឺនុយ</td></tr>
  <tr><td>ទំព័រតែមួយរំកិល</td><td>មាតិកាទាំងអស់នៅលើទំព័ររំកិលតែមួយ</td></tr>
  <tr><td>ក្រឡាចត្រង្ហទស្សនាសារ</td><td>ប្លង់ស្ទីលទស្សនាសារជាក្រឡាចត្រង្គ</td></tr>
  <tr><td>ហ៊ីរ៉ូពេញអេក្រង់</td><td>ប្លង់ផ្តោតលើរូបភាពហ៊ីរ៉ូធំ</td></tr>
</table>

<p>ការកំណត់បន្ថែម: <strong>ផ្ទៃខាងក្រោយ</strong>, <strong>លេខតាមដាន Google Analytics</strong> និង <strong>ស្គ្រីបជជែក</strong>។</p>

<h3>៦.២ ការកំណត់ឡូហ្គោ</h3>
<p>ចូលទៅ <strong>ការកំណត់ → ឡូហ្គោ</strong></p>
<ul>
  <li><strong>រូបភាពឡូហ្គោ</strong> — ផ្ទុកឡើង ឬកំណត់ URL រូបភាពឡូហ្គោ</li>
  <li><strong>ឡូហ្គោទូរស័ព្ទ</strong> — ឡូហ្គោដាច់ដោយឡែកសម្រាប់ទូរស័ព្ទ (ជំរើស)</li>
  <li><strong>ទីតាំងឡូហ្គោ</strong> — ឆ្វេង, កណ្តាល ឬ ស្តាំ</li>
</ul>

<h3>៦.៣ ការកំណត់ប័ណ្ណសារ</h3>
<p>ចូលទៅ <strong>ការកំណត់ → ប័ណ្ណសារ</strong></p>
<ul>
  <li><strong>បង្ហាញប័ណ្ណសារ</strong> — បិទ/បើកស្លាយប័ណ្ណសារ</li>
  <li>បន្ថែមរូបភាពប័ណ្ណសារជាមួយចំណងជើង និងតំណជំរើស</li>
  <li>តំរៀបឡើងវិញ ឬលុបប័ណ្ណសារ</li>
</ul>

<h3>៦.៤ តំណបណ្ដាញសង្ខេប</h3>
<p>ចូលទៅ <strong>ការកំណត់ → បណ្ដាញសង្ខេប</strong></p>
<p>បន្ថែមតំណទៅគណនីបណ្ដាញសង្ខេបរបស់អ្នក: Facebook, Google, YouTube, LinkedIn, Twitter។<br>
បញ្ចូល URL ពេញសម្រាប់គ្នា (ឧទាហរណ៍ <code>https://facebook.com/yourpage</code>)។</p>

<h3>៦.៥ ការគ្រប់គ្រងភាសា</h3>
<p>ចូលទៅ <strong>ការកំណត់ → ភាសា</strong></p>
<table>
  <tr><th>ទង់ជាតិ</th><th>ភាសា</th></tr>
  <tr><td>០</td><td>ខ្មែរ 🇰🇭</td></tr>
  <tr><td>១</td><td>អង់គ្លេស 🇺🇸</td></tr>
  <tr><td>២</td><td>ចិន 🇨🇳</td></tr>
  <tr><td>៣</td><td>ថៃ 🇹🇭</td></tr>
  <tr><td>៤</td><td>វៀតណាម 🇻🇳</td></tr>
</table>
<div class="warn-box">⚠️ <strong>សំខាន់:</strong> ភាសានីមួយៗមានម៉ឺនុយ និងមាតិកាផ្ទាល់ខ្លួន។ ការបន្ថែមភាសាមានន័យថាអ្នកត្រូវបង្កើតម៉ឺនុយ និងមាតិកាសម្រាប់វា។</div>

<h2 id="ai-chat-assistant">៧. ជំនួយការ AI</h2>
<p>ជំនួយការ AI អនុញ្ញាតឱ្យអ្នកគ្រប់គ្រងវេបសាយដោយប្រើភាសាធម្មតា — មិនចាំបាច់មានចំណេះដឹងបច្ចេកទេសទេ។</p>

<h3>អ្វីដែលអ្នកអាចសួរបាន</h3>
<table>
  <tr><th>ប្រភេទ</th><th>ពាក្យបញ្ជាឧទាហរណ៍</th></tr>
  <tr><td><strong>ប្តូរស្បែក</strong></td><td>"ប្តូរស្បែកទៅក្រហម", "ប្តូរទៅពណ៌ងងឹត"</td></tr>
  <tr><td><strong>ប្តូរប្លង់</strong></td><td>"ប្តូរប្លង់ទៅទស្សនាសារ", "ប្រើប្លង់បុរាណ"</td></tr>
  <tr><td><strong>បង្កើតទំព័រ</strong></td><td>"បង្កើតទំព័រឈ្មោះសេវាកម្មជាមួយមាតិកាអំពីការរចនាវេប"</td></tr>
  <tr><td><strong>បង្កើតម៉ឺនុយ</strong></td><td>"បន្ថែមធាតុម៉ឺនុយឈ្មោះទំនាក់ទំនង"</td></tr>
  <tr><td><strong>កែសម្រួលមាតិកា</strong></td><td>"ធ្វើបច្ចុប្បន្នភាពទំព័រអំពីយើង"</td></tr>
  <tr><td><strong>លុបមាតិកា</strong></td><td>"លុបអត្ថបទព័ត៌មានចាស់"</td></tr>
  <tr><td><strong>ដំឡើងវេបសាយ</strong></td><td>"ជួយដំឡើងវេបសាយខ្ញុំ" (សម្រាប់វេបសាយថ្មី)</td></tr>
</table>

<h3>ដែនកំណត់ការប្រើប្រាស់</h3>
<p><strong>សំណួរ ១០ ក្នុងមួយថ្ងៃ</strong> ក្នុងមួយអ្នកប្រើ។ AI នឹងប្រាប់អ្នកអំពីចំនួនសំណួរដែលនៅសល់។</p>

<h3>គន្លឹះសម្រាប់លទ្ធផលល្អបំផុត</h3>
<div class="tip-box">
  ✅ <strong>ជាក់លាក់:</strong> "បង្កើតទំព័រឈ្មោះ 'ក្រុមយើង' ជាមួយមាតិកាអំពីសមាជិក ៥ របស់យើង"<br>
  ✅ <strong>រៀបរាប់ពីភាសា:</strong> "បង្កើតទំព័រជាភាសាខ្មែរឈ្មោះ 'សេវាកម្ម'"<br>
  ❌ <strong>ចៀសវាងសំណើមិនច្បាស់:</strong> "ធ្វើឱ្យប្រសើរឡើង" — បញ្ជាក់អ្វីដែលអ្នកចង់ប្តូរ<br>
  ❌ <strong>មិនអាចផ្ទុកឯកសារ:</strong> AI មិនអាចផ្ទុករូបភាពឡើងបានទេ; ប្រើបណ្ណាល័យមីឌៀសម្រាប់រឿងនោះ
</div>

<h2 id="quick-setup-wizard">៨. ការដំឡើងរហ័ស</h2>
<p>សម្រាប់វេបសាយថ្មី អ្នកជំនួយការដំឡើងនឹងណែនាំអ្នកតាមរយៈការកំណត់ដំបូង:</p>

<h3>ជំហានទី ១: ភាសា</h3>
<ol>
  <li>ចូលទៅ <strong>គ្រប់គ្រង → ដំឡើង</strong></li>
  <li>ជ្រើសរើស <strong>ភាសាលំនាំដើម</strong> (ខ្មែរ, អង់គ្លេស, ចិន, ថៃ ឬវៀតណាម)</li>
  <li>ចុច <strong>បន្ទាប់</strong></li>
</ol>

<h3>ជំហានទី ២: ម៉ឺនុយ និងការកំណត់</h3>
<ol>
  <li>បញ្ចូល <strong>ចំណងជើងវេបសាយ</strong></li>
  <li>ជ្រើសរើសដើម្បីបង្កើត <strong>ម៉ឺនុយលំនាំដើម</strong> (ទំព័រដើម, អំពីយើង, សេវាកម្ម, ទំនាក់ទំនង)</li>
  <li>ចុច <strong>បន្ទាប់</strong></li>
</ol>

<h3>ជំហានទី ៣: មាតិកាដំបូង</h3>
<ol>
  <li>ជ្រើសរើស <strong>ទំព័រម៉ឺនុយ</strong> ដើម្បីបន្ថែមមាតិកា</li>
  <li>បញ្ចូល <strong>ចំណងជើង</strong> និង <strong>ការពិពណ៌នា</strong></li>
  <li>ចុច <strong>បញ្ចប់</strong></li>
</ol>
<p>វេបសាយរបស់អ្នកឥឡូវនេះបានផ្សាយជាមួយមាតិកាមូលដ្ឋានគ្រឹះហើយ!</p>

<h2 id="profile-password">៩. ប្រូហ្វាល់ និងពាក្យសម្ងាត់</h2>

<h3>ការធ្វើបច្ចុប្បន្នភាពប្រូហ្វាល់</h3>
<ol>
  <li>ចូលទៅ <strong>ប្រូហ្វាល់</strong> នៅក្នុងរបារចំហៀង</li>
  <li>ធ្វើបច្ចុប្បន្នភាព <strong>ឈ្មោះពេញ</strong>, <strong>អ៊ីមែល</strong> ឬ <strong>លេខទូរស័ព្ទ</strong></li>
  <li>ចុច <strong>រក្សាទុក</strong></li>
</ol>

<h3>ការប្តូរពាក្យសម្ងាត់</h3>
<ol>
  <li>ចូលទៅ <strong>ពាក្យសម្ងាត់</strong> នៅក្នុងរបារចំហៀង</li>
  <li>បញ្ចូល <strong>ពាក្យសម្ងាត់បច្ចុប្បន្ន</strong></li>
  <li>បញ្ចូល <strong>ពាក្យសម្ងាត់ថ្មី</strong> (យ៉ាងតិច ៦ តួអក្សរ)</li>
  <li>បញ្ជាក់ពាក្យសម្ងាត់ថ្មី</li>
  <li>ចុច <strong>រក្សាទុក</strong></li>
</ol>
`
  }
};

function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.getElementById('guide-content').innerHTML = translations[lang].content;
  document.querySelector('[data-i18n="footer"]').textContent = translations[lang].footer;
  document.documentElement.lang = lang === 'kh' ? 'km' : 'en';
  localStorage.setItem('guide-lang', lang);
}

// Restore saved language
const savedLang = localStorage.getItem('guide-lang') || 'en';
if (savedLang !== 'en') setLang(savedLang);
else document.getElementById('guide-content').innerHTML = translations.en.content;
</script>
