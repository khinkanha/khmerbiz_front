<h2 id="ai-chat-assistant">7. AI Chat Assistant</h2>
<p>The AI assistant lets you manage your website using natural language — no technical knowledge required.</p>
<h3>Accessing AI Chat</h3>
<p>From the <strong>Dashboard</strong>, click the <strong>🤖 AI Assistant</strong> quick-action button. This opens the full AI Chat page.</p>
<h3>What you can ask</h3>
<table>
  <tr><th>Category</th><th>Example</th></tr>
  <tr><td>Theme</td><td>"Change theme to red", "Switch to dark mode"</td></tr>

  <tr><td>Create pages</td><td>"Create a page called Services with content about web design"</td></tr>
  <tr><td>Create menus</td><td>"Add a menu item called Contact"</td></tr>
  <tr><td>Create content</td><td>"Write an article about our company history"</td></tr>
  <tr><td>Edit / delete</td><td>"Update the About Us page", "Delete the old news article"</td></tr>
  <tr><td>Setup</td><td>"Help me set up my website"</td></tr>
</table>
<h3>Usage limits</h3>
<ul>
  <li><strong>10 questions per day</strong> per user</li>
  <li>The AI shows how many questions you have remaining</li>
</ul>
<h3>Tips for best results</h3>
<ul>
  <li>✅ Be specific: "Create a page called 'Our Team' with content about our 5 team members"</li>
  <li>✅ Mention the language: "Create a page in Khmer called 'សេវាកម្ម'"</li>
  <li>❌ Avoid vague requests like "Make it better" — say what you want changed</li>
  <li>❌ The AI cannot upload images; use the Media Library for that</li>
</ul>
<h3>Confirming &amp; undoing actions</h3>
<ul>
  <li>Before risky changes, the AI shows a <strong>preview</strong> with <strong>Confirm</strong> / <strong>Cancel</strong> — nothing changes until you confirm.</li>
  <li>If the AI needs more info (e.g. "which news section?"), it shows a dropdown, then <strong>Submit</strong>.</li>
  <li><strong>Undo:</strong> every successful create/update shows an <strong>Undo</strong> button to reverse it.</li>
  <li><strong>Operation history:</strong> the history button in the chat header lists recent operations (completed / pending / failed / rolled back) with an undo option where applicable.</li>
</ul>
<h3>What the AI cannot do</h3>
<ul>
  <li>Upload or manage images (use the Media Library)</li>
  <li>Change your password or username</li>
  <li>Manage user accounts (requires Super Admin)</li>
  <li>Access other websites' data</li>
</ul>

<h2 id="roles-super-admin">10. Roles &amp; Super Admin</h2>
<p>Your account's role controls which parts of the admin panel you can see.</p>
<table>
  <tr><th>Role</th><th>What they can do</th></tr>
  <tr><td><strong>Web Admin</strong></td><td>Full control of their own site: content, menus, media, settings, and managing their site's users</td></tr>
  <tr><td><strong>Normal User</strong></td><td>Can edit content / menus / media and settings, but <strong>cannot</strong> manage users</td></tr>
  <tr><td><strong>Super Admin</strong></td><td>Platform-wide: manages all tenant domains, all users, and announcements</td></tr>
</table>
<h3>Super Admin areas</h3>
<p>If you are a Super Admin, the Dashboard shows extra quick actions:</p>
<ul>
  <li><strong>Domains</strong> — create and manage every tenant domain (each with its own theme, settings, languages, menus, content)</li>
  <li><strong>Users</strong> — view and manage all platform users and assign roles</li>
  <li><strong>Announcements</strong> — create platform-wide announcements</li>
</ul>
<div class="tip-box">Web Admins manage their <em>own site's</em> users at <strong>Users</strong>; only Super Admins reach the platform-wide areas above.</div>

<h2 id="bilingual">11. Making Your Site Bilingual</h2>
<p>Each language has its <strong>own menus and content</strong> — they are not automatic translations. To add a second language end-to-end:</p>
<ol>
  <li><strong>Enable the language:</strong> go to <strong>Settings → Language</strong>, add the language (e.g. English) and pick its flag. Set it as default only if visitors should see it first.</li>
  <li><strong>Build that language's menu tree:</strong> go to <strong>Menu</strong>, switch the admin language selector (top-right) to the new language, and create the menu items — one tree per language.</li>

  <li>បន្ថែម <strong>ចំណងជើង</strong> និង <strong>ការពិពណ៌នា</strong> សម្រាប់សញ្ញាបង្ហាញទីតាំង</li>
  <li>បិទ/បើក <strong>មើលឃើញ</strong> ដើម្បីបង្ហាញ/លាក់ផែនទី</li>
  <li>ចុច <strong>រក្សាទុក</strong></li>
</ol>
<h3>កែសម្រួល និងលុបមាតិកា</h3>
<ol>
  <li>ក្នុងបញ្ជី <strong>មាតិកា</strong> ចុច <strong>pencil</strong> (✏️) ដើម្បីកែផ្នែក ឬ <strong>list</strong> ដើម្បីគ្រប់គ្រងធាតុ</li>
  <li>កែប្រែវាល ហើយ <strong>រក្សាទុក</strong></li>
  <li>ចុច <strong>trash</strong> (🗑️) ដើម្បីលុប — អ្នកនឹងត្រូវបានសួរដើម្បីបញ្ជាក់</li>
</ol>
<div class="warn-box">⚠️ <strong>ព្រមាន:</strong> មាតិកាដែលបានលុបមិនអាចស្តារវិញបានទេ។</div>
<h3>ព្រាង និង បានផ្សាយ</h3>
<ul>
  <li>មាតិកា <strong>បានផ្សាយ</strong> មានជីវិតនៅលើវេបសាយសាធារណៈ។</li>
  <li>មាតិកា <strong>ព្រាង</strong> ត្រូវបានរក្សាទុកប៉ុន្តែ <strong>មើលមិនឃើញ</strong>ដល់អ្នកមើល — ប្រើវាដើម្បីធ្វើការលើទំព័រមុនពេលផ្សាយ។</li>
  <li>ប្រើតម្រង <strong>ស្ថានភាព</strong> និង <strong>ប្រភេទមាតិកា</strong> នៅផ្នែកខាងលើបញ្ជីមាតិកាដើម្បីស្វែងរកយ៉ាងរហ័ស។</li>
</ul>

<h2 id="menu-management">៤. ការគ្រប់គ្រងម៉ឺនុយ</h2>
<p>ម៉ឺនុយកំណត់ការរុករកវេបសាយរបស់អ្នក។ ធាតុម៉ឺនុយនីមួយៗភ្ជាប់ទៅទំព័រមាតិកា ឬ URL ខាងក្រៅ។</p>
<h3>ការបង្កើតធាតុម៉ឺនុយ</h3>
<ol>
  <li>ចូលទៅ <strong>ម៉ឺនុយ</strong> ក្នុងរបារចំហៀង</li>
  <li>ចុច <strong>បន្ថែមថ្មី</strong></li>
  <li>បំពេញ:
    <ul>
      <li><strong>ឈ្មោះម៉ឺនុយ</strong> — អក្សរបង្ហាញក្នុងការរុករក (ឧ. "អំពីយើង")</li>
      <li><strong>URL ម៉ឺនុយ</strong> — តំណស្រេចចិត្ត (ទទេប្រសិនបើភ្ជាប់ទៅមាតិកា)</li>
      <li><strong>ម៉ឺនុយមេ</strong> — ជ្រើសមេសម្រាប់ម៉ឺនុយរង ឬ "គ្មាន" សម្រាប់កំពូល</li>
      <li><strong>ភាសា</strong> — ភាសាណាម៉ឺនុយនេះ</li>
      <li><strong>លំដាប់</strong> — ទីតាំងបង្ហាញ (លេខតិចជាងបង្ហាញមុន)</li>
    </ul>
  </li>
  <li>ចុច <strong>រក្សាទុក</strong></li>
</ol>
<div class="warn-box">⚠️ ការលុបធាតុម៉ឺនុយ <strong>មិន</strong>លុបមាតិកាដែលភ្ជាប់ទេ។</div>
<div class="tip-box">ទំព័រនេះគ្រប់គ្រង <em>ធាតុម៉ឺនុយ</em>។ ដើម្បីប្តូរ <strong>ទីតាំង</strong> និង <strong>ការតម្រឹម</strong> របារម៉ឺនុយ ចូលទៅ <strong>ការកំណត់ → ម៉ឺនុយ</strong>។</div>

<h2 id="media-library">៥. បណ្ណាល័យមីឌៀ</h2>
<p>បណ្ណាល័យមីឌៀគ្រប់គ្រងរូបភាព វីដេអូ និងឯកសារ។ ឯកសារត្រូវបានរក្សាទុកលើ cloud storage (DigitalOcean Spaces)។</p>
<h3>ការផ្ទុកឡើងឯកសារ</h3>
<ol>
  <li>ចូលទៅ <strong>មីឌៀ</strong> ក្នុងរបារចំហៀង</li>
  <li>ចុច <strong>ជ្រើសឯកសារ</strong> (ឬអូសដាក់)</li>
  <li>ជ្រើសឯកសារ — រូបភាព វីដេអូ និងឯកសារត្រូវបានគាំទ្រ</li>
</ol>
<h3>ការប្រើមីឌៀក្នុងមាតិកា</h3>
<p>នៅពេលបន្ថែមរូបភាពទៅមាតិកា សូមយោង URL ឯកសារពីបណ្ណាល័យមីឌៀ។ URL រូបភាពមានលក្ខណៈ: <code>https://khmer.sgp1.digitaloceanspaces.com/your-file-path</code></p>

<h2 id="settings">៦. ការកំណត់</h2>
<h3>៦.១ ទូទៅ</h3>
<ul>
  <li><strong>ចំណងជើងវេបសាយ</strong> — ឈ្មោះវេបសាយ</li>
  <li><strong>រូបភាពផ្ទៃខាងក្រោយ</strong> — រូបភាពផ្ទៃខាងក្រោយស្រេចចិត្ត</li>
  <li><strong>របៀបអេក្រង់</strong> — <strong>ពេញអេក្រង</strong> ឬ <strong>មធ្យម</strong></li>
  <li><strong>ជើង</strong> — អក្សរឬ HTML សម្រាប់បាតវេបសាយ</li>
  <li><strong>ការតម្រឹមជើង</strong> — <strong>ឆ្វេង</strong>, <strong>កណ្តាល</strong>, ឬ <strong>ស្តាំ</strong></li>
  <li><strong>រូបរាង</strong> — ពណ៌៖ លំនាំដើម, ងងឹត, ក្រហម, បៃតង, ស្វាយ, ឬ លឿង</li>
  <li><strong>លេខសម្គាល់ Google Analytics</strong> — ស្ថិតិអ្នកមើល</li>
  <li><strong>វិជេតជជែក</strong> — បិទភ្ជាប់ស្គ្រីប embed</li>
  <li><strong>ជ្រើសរូបរាងគំរូ</strong> — ជ្រើសប្លង់៖ Classic Multi-Page, Scrolling Single-Page, Magazine/News Grid, ឬ Fullscreen Hero</li>
</ul>
<h3>៦.២ ឡូហ្គោ</h3>
<ul>
  <li><strong>រូបភាពឡូហ្គោ</strong> / <strong>ឡូហ្គោទូរស័ព្ទ</strong> / <strong>ទីតាំងឡូហ្គោ</strong> (ឆ្វេង/កណ្តាល/ស្តាំ) / <strong>ការតម្រឹមឡូហ្គោ</strong></li>
</ul>
<h3>៦.៣ បាណឺរ</h3>
<ul>
  <li><strong>ការបង្ហាញស្លាយ</strong> — បើក/បិទស្លាយបាណឺរ</li>
  <li><strong>របៀបស្លាយ</strong> / <strong>ទីតាំងស្លាយ</strong></li>
</ul>
<p><strong>រូបភាពបាណឺរ:</strong> បន្ថែមបាណឺរជាមួយចំណងជើង, រូបភាព (URL), តំណ, និងទំហំ។</p>
<h3>៦.៤ បណ្តាញសង្គម</h3>
<p>បន្ថែមតំណ profile សង្គម — Facebook, Google, YouTube, LinkedIn, Twitter។</p>
<h3>៦.៥ ភាសា</h3>
<ul>
  <li><strong>បន្ថែមភាសា</strong> — ខ្មែរ, អង់គ្លេស, ចិន, ថៃ, ឬ វៀតណាម</li>
  <li><strong>កំណត់លំនាំដើម</strong> / <strong>លុបភាសា</strong></li>
</ul>
<div class="warn-box">⚠️ ភាសានីមួយៗមានម៉ឺនុយ និងមាតិកាផ្ទាល់ខ្លួន។ ការបន្ថែមភាសាមានន័យថាអ្នកត្រូវបង្កើតម៉ឺនុយ និងមាតិកាសម្រាប់វា។</div>
<h3>៦.៦ ទីតាំង និងការតម្រឹមម៉ឺនុយ</h3>
<ul>
  <li><strong>ទីតាំងម៉ឺនុយ</strong> — <strong>លើ</strong>, <strong>កណ្តាល</strong>, ឬ <strong>ក្រោម</strong></li>
  <li><strong>ការតម្រឹមម៉ឺនុយ</strong> — <strong>ឆ្វេង</strong>, <strong>កណ្តាល</strong>, ឬ <strong>ស្តាំ</strong></li>
</ul>

<h2 id="ai-chat-assistant">៧. ជំនួយការ AI</h2>
<p>ជំនួយការ AI អនុញ្ញាតឱ្យអ្នកគ្រប់គ្រងវេបសាយដោយប្រើភាសាធម្មតា — មិនត្រូវការចំណេះដឹងបច្ចេកទេសទេ។</p>
<h3>ការចូលប្រើ AI Chat</h3>
<p>ពី <strong>ផ្ទាំងគ្រប់គ្រង</strong> ចុចប៊ូតុងសកម្មភាពរហ័ស <strong>🤖 ជំនួយការ AI</strong>។ វាបើកទំព័រ AI Chat ពេញលេញ។</p>
<h3>អ្វីដែលអ្នកអាចសួរ</h3>
<table>
  <tr><th>ប្រភេទ</th><th>ឧទាហរណ៍</th></tr>
  <tr><td>រូបរាង</td><td>"ប្តូររូបរាងទៅក្រហម", "ប្តូរទៅរបៀបងងឹត"</td></tr>
  <tr><td>ប្លង់</td><td>"ប្តូរប្លង់ទៅម៉ាកាហ្ស៊ីន"</td></tr>
  <tr><td>បង្កើតទំព័រ</td><td>"បង្កើតទំព័រឈ្មោះ Services ជាមួយមាតិកាអំពីការរចនាវេប"</td></tr>
  <tr><td>បង្កើតម៉ឺនុយ</td><td>"បន្ថែមធាតុម៉ឺនុយឈ្មោះ Contact"</td></tr>
  <tr><td>បង្កើតមាតិកា</td><td>"សរសេរអត្ថបទអំពីប្រវត្តិក្រុមហ៊ុនរបស់យើង"</td></tr>
  <tr><td>កែសម្រួល/លុប</td><td>"កែប្រែទំព័រអំពីយើង", "លុបអត្ថបទព័ត៌មានចាស់"</td></tr>
  <tr><td>ដំឡើង</td><td>"ជួយខ្ញុំដំឡើងវេបសាយ"</td></tr>
</table>
<h3>ដែនកំណត់ប្រើប្រាស់</h3>
<ul>
  <li><strong>១០ សំណួរក្នុងមួយថ្ងៃ</strong>ក្នុងមួយអ្នកប្រើ</li>
  <li>AI បង្ហាញពីចំនួនសំណួរដែលនៅសល់</li>
</ul>
<h3>ការបញ្ជាក់ និងការមិនធ្វើវិញ</h3>
<ul>
  <li>មុនពេលផ្លាស់ប្តូរមានហានិភ័យ AI បង្ហាញ <strong>ការមើលជាមុន</strong>ជាមួយ <strong>បញ្ជាក់</strong>/<strong>បោះបង់</strong>។</li>
  <li>ប្រសិនបើ AI ត្រូវការព័ត៌មានបន្ថែម វាបង្ហាញ dropdown ហើយបន្ទាប់មក <strong>ដាក់ស្នើ</strong>។</li>
  <li><strong>មិនធ្វើវិញ:</strong> សកម្មភាពបង្កើត/កែប្រែជោគជ័យនីមួយៗបង្ហាញប៊ូតុង <strong>មិនធ្វើវិញ</strong>។</li>
  <li><strong>ប្រវត្តិប្រតិបត្តិការ:</strong> ប៊ូតុងប្រវត្តិក្នុងក្បាលជជែកបង្ហាញប្រតិបត្តិការថ្មីៗ។</li>
</ul>
<h3>អ្វីដែល AI មិនអាចធ្វើបាន</h3>
<ul>
  <li>ផ្ទុកឬគ្រប់គ្រងរូបភាព (ប្រើបណ្ណាល័យមីឌៀ)</li>
  <li>ប្តូរពាក្យសម្ងាត់ឬឈ្មោះអ្នកប្រើ</li>
  <li>គ្រប់គ្រងគណនីអ្នកប្រើ (ត្រូវការ Super Admin)</li>
</ul>

<h2 id="quick-setup-wizard">៨. ការដំឡើងរហ័ស</h2>
<h3>ជំហាន ១: ភាសា</h3>
<ol>
  <li>ចូលទៅ <strong>Admin → Setup</strong></li>
  <li>ជ្រើសភាសាលំនាំដើម</li>
  <li>ចុច <strong>បន្ទាប់</strong></li>
</ol>
<h3>ជំហាន ២: ម៉ឺនុយ និងការកំណត់មូលដ្ឋាន</h3>
<ol>
  <li>បញ្ចូល <strong>ចំណងជើងវេបសាយ</strong></li>
  <li>ជ្រើសថាតើបង្កើតម៉ឺនុយលំនាំដើម</li>
  <li>ចុច <strong>បន្ទាប់</strong></li>
</ol>
<h3>ជំហាន ៣: មាតិកាដំបូង</h3>
<ol>
  <li>ជ្រើសទំព័រម៉ឺនុយដើម្បីបន្ថែមមាតិកា</li>
  <li>បញ្ចូលចំណងជើងនិងការពិពណ៌នា</li>
  <li>ចុច <strong>បញ្ចប់</strong></li>
</ol>

<h2 id="profile-password">៩. ប្រូហ្វាល់ និងពាក្យសម្ងាត់</h2>
<h3>ការកែប្រែប្រូហ្វាល់</h3>
<ol>
  <li>ចូលទៅ <strong>ប្រូហ្វាល់</strong></li>
  <li>កែប្រែឈ្មោះពេញ, អ៊ីមែល, និងលេខទូរស័ព្ទ</li>
  <li>ចុច <strong>រក្សាទុក</strong></li>
</ol>
<h3>ការប្តូរពាក្យសម្ងាត់</h3>
<ol>
  <li>ចូលទៅ <strong>ពាក្យសម្ងាត់</strong></li>
  <li>បញ្ចូលពាក្យសម្ងាត់បច្ចុប្បន្ន និងពាក្យសម្ងាត់ថ្មី (យ៉ាងតិច ៦ តួអក្សរ)</li>
  <li>ចុច <strong>រក្សាទុក</strong></li>
</ol>

<h2 id="roles-super-admin">១០. តួនាទី និង Super Admin</h2>
<table>
  <tr><th>តួនាទី</th><th>អ្វីដែលពួកគេអាចធ្វើ</th></tr>
  <tr><td><strong>Web Admin</strong></td><td>គ្រប់គ្រងពេញលេញនៃ site ផ្ទាល់ខ្លួន៖ មាតិកា ម៉ឺនុយ មីឌៀ ការកំណត់ អ្នកប្រើ site</td></tr>
  <tr><td><strong>Normal User</strong></td><td>កែមាតិកា/ម៉ឺនុយ/មីឌៀ/ការកំណត់ ប៉ុន្តែ <strong>មិនអាច</strong>គ្រប់គ្រងអ្នកប្រើ</td></tr>
  <tr><td><strong>Super Admin</strong></td><td>ទូទាំង platform៖ ដូម៉ែន អ្នកប្រើ ការប្រកាស</td></tr>
</table>
<h3>ផ្នែក Super Admin</h3>
<ul>
  <li><strong>ដូម៉ែន</strong> — បង្កើតនិងគ្រប់គ្រងដូម៉ែន tenant ទាំងអស់</li>
  <li><strong>អ្នកប្រើ</strong> — គ្រប់គ្រងអ្នកប្រើ platform ទាំងអស់ និងកំណត់តួនាទី</li>
  <li><strong>ការប្រកាស</strong> — បង្កើតការប្រកាសទូទាំង platform</li>
</ul>

<h2 id="bilingual">១១. ការបង្កើតវេបសាយទ្វេភាសា</h2>
<p>ភាសានីមួយៗមាន <strong>ម៉ឺនុយ និងមាតិកាផ្ទាល់ខ្លួន</strong> — មិនមែនជាការបកប្រែស្វ័យប្រវត្តិទេ។</p>
<ol>
  <li><strong>បើកភាសា:</strong> ចូលទៅ <strong>ការកំណត់ → ភាសា</strong> បន្ថែមភាសា និងជ្រើសទង់ជាតិ។</li>
  <li><strong>បង្កើតឈ្មោះម៉ឺនុយភាសានោះ:</strong> ចូលទៅ <strong>ម៉ឺនុយ</strong> ប្តូរកម្មវិធីជ្រើសភាសាទៅភាសាថ្មី និងបង្កើតធាតុម៉ឺនុយ។</li>
  <li><strong>បង្កើតមាតិកាសម្រាប់ធាតុម៉ឺនុយនីមួយៗ:</strong> ភាសាមកពីធាតុម៉ឺនុយដែលអ្នកជ្រើស។</li>
  <li><strong>ធ្វើម្ដងទៀតសម្រាប់បាណឺរ/ឡូហ្គោ/មីឌៀ</strong> តាមតម្រូវការ។</li>
  <li><strong>មើលជាមុន:</strong> បើកវេបសាយសាធារណៈ និងប្រើកម្មវិធីជ្រើសភាសាដើម្បីបញ្ជាក់។</li>
</ol>
<div class="warn-box">⚠️ ការបន្ថែមភាសា <strong>មិន</strong>ចម្លងម៉ឺនុយឬមាតិកាដែលមានស្រាប់ទេ — អ្នកបង្កើតវាថ្មីសម្រាប់ភាសានោះ។</div>

<h3>គន្លឹះកម្មវិធី និងការស្វែងរកជំនួយ</h3>
<ul>
  <li>ប្រើ <strong>breadcrumb</strong> ដើម្បីត្រលប់ក្រោយ; ចុច <strong>ឡូហ្គោ</strong> ដើម្បីត្រឡប់ទៅផ្ទាំងគ្រប់គ្រង</li>
  <li>ប្រើប៊ូតុង <strong>រក្សាទុក</strong> លើទម្រង់នីមួយៗ (មិនមានគ្រាប់ចុចលេខកូដទេ)</li>
  <li>កម្មវិធីជ្រើសភាសា (ស្តាំខាងលើ) ប្តូរភាសាចំណុចប្រទាក់គ្រប់គ្រង</li>
  <li>សាកល្បង <strong>ជំនួយការ AI</strong> ឬទាក់ទង <strong>Super Admin</strong> សម្រាប់បញ្ហា</li>
</ul>
`
  }
};

function setLang(lang) {
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.getElementById('guide-content').innerHTML = translations[lang].content;
  document.querySelector('[data-i18n="footer"]').textContent = translations[lang].footer;
  document.documentElement.lang = lang === 'kh' ? 'km' : 'en';
  localStorage.setItem('guide-lang', lang);
}

const savedLang = localStorage.getItem('guide-lang') || 'en';
if (savedLang !== 'en') setLang(savedLang);
else document.getElementById('guide-content').innerHTML = translations.en.content;
</script>
